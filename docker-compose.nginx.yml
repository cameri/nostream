services:
  nginx:
    image: nginx:1.25-alpine
    container_name: nostream-nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - ${PWD}/nginx/conf.d:/etc/nginx/conf.d
      - ${PWD}/nginx/ssl:/etc/nginx/ssl
      - certbot-webroot:/var/www/certbot
    depends_on:
      - nostream
    restart: on-failure
    # Run nginx in foreground (so container exits if nginx dies).
    # A background loop watches for a signal file created by certbot
    # after cert issuance/renewal, and reloads nginx within seconds.
    command: >
      /bin/sh -c "while :; do
        if [ -f /etc/nginx/ssl/reload-nginx ]; then
          nginx -s reload;
          rm -f /etc/nginx/ssl/reload-nginx;
        fi;
        sleep 5;
      done & nginx -g 'daemon off;'"
    networks:
      default:

  certbot:
    image: certbot/certbot:latest
    container_name: nostream-certbot
    volumes:
      - ${PWD}/nginx/ssl:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: >
      sh -c "
      if [ ! -f /etc/letsencrypt/renewal/${RELAY_DOMAIN}.conf ]; then
        rm -rf /etc/letsencrypt/live/${RELAY_DOMAIN};
      fi;
      certbot certonly
      --webroot
      --webroot-path=/var/www/certbot
      --email ${CERTBOT_EMAIL}
      --agree-tos
      --no-eff-email
      --keep-until-expiring
      -n
      -d ${RELAY_DOMAIN}
      --deploy-hook 'touch /etc/letsencrypt/reload-nginx'
      && trap exit TERM;
      while :; do
        certbot renew --quiet
          --deploy-hook 'touch /etc/letsencrypt/reload-nginx';
        sleep 12h & wait $${!};
      done"
    depends_on:
      - nginx
    restart: on-failure
    networks:
      default:

volumes:
  certbot-webroot:
